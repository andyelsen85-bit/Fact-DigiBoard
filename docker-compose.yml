services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: digiboard
      POSTGRES_USER: digiboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digiboard_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digiboard -d digiboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      NODE_ENV: production
      PORT: 80
      DATABASE_URL: postgres://digiboard:${POSTGRES_PASSWORD:-digiboard_secret}@postgres:5432/digiboard
      SESSION_SECRET: ${SESSION_SECRET:-change_this_in_production_please}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
